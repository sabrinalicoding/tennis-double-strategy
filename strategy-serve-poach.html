<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Serve + Poach Strategy Demo</title>
    <link rel="stylesheet" href="./strategy-serve-poach.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <h1>Serve + Poach Scenario</h1>
          <p>
            Rule focus: when your partner serves from baseline, you stay between
            <strong>0</strong> and <strong>4</strong>, then poach to
            <strong>1</strong> if needed.
          </p>
        </div>
        <a class="link-btn" href="./index.html">Back to Editor</a>
      </header>

      <section class="panel">
        <div class="controls">
          <button id="playPauseBtn" type="button">Pause</button>
          <button id="resetBtn" type="button">Reset</button>
          <label class="toggle">
            <input id="poachToggle" type="checkbox" checked />
            Return angle manageable (poach trigger)
          </label>
          <p id="phaseText" class="phase"></p>
        </div>

        <div class="court-wrap">
          <svg id="scene" viewBox="0 0 36 78" class="scene">
            <rect x="0" y="0" width="36" height="78" fill="#2d7f4f" />
            <rect x="0.6" y="0.6" width="34.8" height="76.8" fill="none" stroke="#fff" stroke-width="0.45" />
            <line x1="4.5" y1="0.6" x2="4.5" y2="77.4" stroke="#fff" stroke-width="0.35" />
            <line x1="31.5" y1="0.6" x2="31.5" y2="77.4" stroke="#fff" stroke-width="0.35" />
            <line x1="0.6" y1="39" x2="35.4" y2="39" stroke="#fff" stroke-width="0.45" />
            <line x1="4.5" y1="18" x2="31.5" y2="18" stroke="#fff" stroke-width="0.35" />
            <line x1="4.5" y1="60" x2="31.5" y2="60" stroke="#fff" stroke-width="0.35" />
            <line x1="18" y1="18" x2="18" y2="60" stroke="#fff" stroke-width="0.35" />
            <line x1="18" y1="0.6" x2="18" y2="1.9" stroke="#fff" stroke-width="0.35" />
            <line x1="18" y1="77.4" x2="18" y2="76.1" stroke="#fff" stroke-width="0.35" />

            <circle id="marker0" cx="26.2" cy="51.8" r="1.05" class="marker-dot" />
            <text id="label0" x="26.2" y="51.8" class="marker-label">0</text>
            <circle id="marker4" cx="25.4" cy="45.7" r="1.05" class="marker-dot" />
            <text id="label4" x="25.4" y="45.7" class="marker-label">4</text>
            <circle id="marker1" cx="19.9" cy="41.9" r="1.05" class="marker-dot" />
            <text id="label1" x="19.9" y="41.9" class="marker-label">1</text>

            <g id="server" class="player-icon teammate">
              <ellipse class="body" cx="0" cy="0.15" rx="0.95" ry="1.2" />
              <circle class="head" cx="0" cy="-1.35" r="0.55" />
              <line class="arm-left" x1="-0.3" y1="-0.2" x2="-0.95" y2="0.3" />
              <line class="arm-right" x1="0.35" y1="-0.2" x2="1.2" y2="-0.65" />
              <line class="leg-left" x1="-0.25" y1="1.2" x2="-0.65" y2="2.05" />
              <line class="leg-right" x1="0.25" y1="1.2" x2="0.65" y2="2.05" />
              <line class="racket-shaft" x1="1.12" y1="-0.68" x2="1.85" y2="-1.3" />
              <ellipse class="racket-head" cx="2.38" cy="-1.72" rx="0.56" ry="0.82" />
            </g>
            <text id="serverLabel" class="player-label">Partner (Server)</text>

            <g id="you" class="player-icon you">
              <ellipse class="body" cx="0" cy="0.15" rx="0.95" ry="1.2" />
              <circle class="head" cx="0" cy="-1.35" r="0.55" />
              <line class="arm-left" x1="-0.3" y1="-0.2" x2="-0.95" y2="0.3" />
              <line class="arm-right" x1="0.35" y1="-0.2" x2="1.2" y2="-0.65" />
              <line class="leg-left" x1="-0.25" y1="1.2" x2="-0.65" y2="2.05" />
              <line class="leg-right" x1="0.25" y1="1.2" x2="0.65" y2="2.05" />
              <line class="racket-shaft" x1="1.12" y1="-0.68" x2="1.85" y2="-1.3" />
              <ellipse class="racket-head" cx="2.38" cy="-1.72" rx="0.56" ry="0.82" />
            </g>
            <text id="youLabel" class="player-label">You</text>

            <g id="returner" class="player-icon opponent">
              <ellipse class="body" cx="0" cy="0.15" rx="0.95" ry="1.2" />
              <circle class="head" cx="0" cy="-1.35" r="0.55" />
              <line class="arm-left" x1="-0.3" y1="-0.2" x2="-0.95" y2="0.3" />
              <line class="arm-right" x1="0.35" y1="-0.2" x2="1.2" y2="-0.65" />
              <line class="leg-left" x1="-0.25" y1="1.2" x2="-0.65" y2="2.05" />
              <line class="leg-right" x1="0.25" y1="1.2" x2="0.65" y2="2.05" />
              <line class="racket-shaft" x1="1.12" y1="-0.68" x2="1.85" y2="-1.3" />
              <ellipse class="racket-head" cx="2.38" cy="-1.72" rx="0.56" ry="0.82" />
            </g>
            <text id="returnerLabel" class="player-label">Returner</text>

            <g id="oppNet" class="player-icon opponent">
              <ellipse class="body" cx="0" cy="0.15" rx="0.95" ry="1.2" />
              <circle class="head" cx="0" cy="-1.35" r="0.55" />
              <line class="arm-left" x1="-0.3" y1="-0.2" x2="-0.95" y2="0.3" />
              <line class="arm-right" x1="0.35" y1="-0.2" x2="1.2" y2="-0.65" />
              <line class="leg-left" x1="-0.25" y1="1.2" x2="-0.65" y2="2.05" />
              <line class="leg-right" x1="0.25" y1="1.2" x2="0.65" y2="2.05" />
              <line class="racket-shaft" x1="1.12" y1="-0.68" x2="1.85" y2="-1.3" />
              <ellipse class="racket-head" cx="2.38" cy="-1.72" rx="0.56" ry="0.82" />
            </g>
            <text id="oppNetLabel" class="player-label">Opp Net</text>

            <circle id="ball" r="0.55" class="ball" />
          </svg>
        </div>
      </section>
    </main>

    <script src="./strategy-serve-poach.js"></script>
  </body>
</html>
